<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mobile Preview — NVLCRK</title>
  <style>
    :root {
      --bg: #ECECEC;
      --ink: #1A1A1A;
      --ink-2: #6B6B6B;
      --border: #D4D4D4;
      --surface: #FFFFFF;
      --accent: #1A1A1A;
      --phone-w: 390px;
      --phone-h: 810px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
    }

    .shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100dvh;
    }

    /* ---------- Sidebar ---------- */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      position: sticky;
      top: 0;
      align-self: start;
      height: 100dvh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .brand {
      font-family: "Inter", sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .brand strong {
      display: block;
      font-size: 16px;
      letter-spacing: 0.02em;
      color: var(--ink);
      margin-top: 4px;
      font-weight: 700;
    }
    .nav-group-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin: 0 0 8px;
    }
    .nav-list {
      list-style: none;
      margin: 0 0 4px;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-btn {
      width: 100%;
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: baseline;
      gap: 8px;
      background: none;
      border: none;
      padding: 8px 10px;
      margin: 0;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: var(--ink);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background 120ms ease, color 120ms ease;
    }
    .nav-btn:hover { background: #F5F5F5; }
    .nav-btn .n {
      font-size: 10px;
      color: var(--ink-2);
      font-variant-numeric: tabular-nums;
    }
    .nav-btn.is-active {
      background: var(--ink);
      color: #fff;
    }
    .nav-btn.is-active .n { color: rgba(255,255,255,0.6); }

    .note {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      line-height: 1.5;
      color: var(--ink-2);
    }
    .note b { color: var(--ink); }

    /* ---------- Stage ---------- */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 24px 64px;
      gap: 16px;
      min-height: 100dvh;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-2);
      font-weight: 500;
    }
    .toolbar .sep {
      width: 1px;
      height: 14px;
      background: var(--border);
    }
    .toolbar button {
      font: inherit;
      color: inherit;
      background: none;
      border: 1px solid var(--border);
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 2px;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .toolbar button:hover { background: #F5F5F5; border-color: var(--ink); color: var(--ink); }
    .toolbar .current-page {
      color: var(--ink);
      font-weight: 600;
    }

    /* ---------- Phone frame ---------- */
    .phone {
      position: relative;
      width: var(--phone-w);
      height: var(--phone-h);
      background: #0B0B0B;
      border-radius: 48px;
      padding: 14px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.08) inset,
        0 24px 60px rgba(0,0,0,0.18),
        0 6px 16px rgba(0,0,0,0.10);
      flex-shrink: 0;
    }
    .phone::before {
      /* side buttons */
      content: "";
      position: absolute;
      left: -2px;
      top: 140px;
      width: 3px;
      height: 60px;
      background: #0B0B0B;
      border-radius: 2px 0 0 2px;
    }
    .phone::after {
      content: "";
      position: absolute;
      right: -2px;
      top: 180px;
      width: 3px;
      height: 90px;
      background: #0B0B0B;
      border-radius: 0 2px 2px 0;
    }
    .phone-screen {
      position: relative;
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 36px;
      overflow: hidden;
    }
    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 30px;
      background: #0B0B0B;
      border-radius: 18px;
      z-index: 20;
      pointer-events: none;
    }
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 48px;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px 0 28px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      pointer-events: none;
    }
    .status-bar .right {
      display: flex;
      gap: 5px;
      align-items: center;
      font-size: 12px;
    }
    .signal, .wifi, .battery {
      display: inline-block;
    }
    .signal { width: 16px; height: 10px; background:
      linear-gradient(to top, var(--ink) 20%, var(--ink) 20%, transparent 20%) 0 100%/3px 30% no-repeat,
      linear-gradient(to top, var(--ink) 20%, var(--ink) 20%, transparent 20%) 4px 100%/3px 55% no-repeat,
      linear-gradient(to top, var(--ink) 20%, var(--ink) 20%, transparent 20%) 8px 100%/3px 80% no-repeat,
      linear-gradient(to top, var(--ink) 20%, var(--ink) 20%, transparent 20%) 12px 100%/3px 100% no-repeat;
    }
    .wifi {
      width: 14px; height: 10px;
      background: radial-gradient(circle at 50% 100%, var(--ink) 2px, transparent 3px),
                  radial-gradient(circle at 50% 100%, transparent 4px, var(--ink) 4px, var(--ink) 5px, transparent 6px),
                  radial-gradient(circle at 50% 100%, transparent 7px, var(--ink) 7px, var(--ink) 8px, transparent 9px);
    }
    .battery {
      width: 24px; height: 11px;
      border: 1px solid var(--ink);
      border-radius: 3px;
      position: relative;
      padding: 1px;
    }
    .battery::after {
      content: "";
      position: absolute;
      right: -3px; top: 3px;
      width: 2px; height: 4px;
      background: var(--ink);
      border-radius: 0 1px 1px 0;
    }
    .battery i {
      display: block;
      width: 75%;
      height: 100%;
      background: var(--ink);
      border-radius: 1px;
    }

    .phone-frame-iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      padding-top: 48px; /* space under status bar */
      background: #fff;
    }
    /* shift iframe content down via wrapper instead of padding */
    .iframe-wrap {
      position: absolute;
      inset: 0;
      padding-top: 44px;
      padding-bottom: 20px;
    }
    .iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: var(--ink);
      border-radius: 3px;
      z-index: 20;
      opacity: 0.9;
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static; height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .stage { padding: 24px 12px 40px; }
    }
  </style>
</head>
<body>

  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        Mobile Preview
        <strong>NVLCRK — Mobile ≤768px</strong>
      </div>

      <div>
        <p class="nav-group-label">Pages</p>
        <ul class="nav-list" id="nav-list">
          <li><button class="nav-btn is-active" data-page="index.html"><span class="n">01</span><span>Cover / TOC</span></button></li>
          <li><button class="nav-btn" data-page="shop.html"><span class="n">02</span><span>Shop</span></button></li>
          <li><button class="nav-btn" data-page="product.html"><span class="n">03</span><span>Product (PDP)</span></button></li>
          <li><button class="nav-btn" data-page="about.html"><span class="n">04</span><span>About</span></button></li>
          <li><button class="nav-btn" data-page="archive.html"><span class="n">05</span><span>Archive</span></button></li>
          <li><button class="nav-btn" data-page="archive-01.html"><span class="n">06</span><span>Archive Detail</span></button></li>
          <li><button class="nav-btn" data-page="cafe.html"><span class="n">07</span><span>Cafe</span></button></li>
          <li><button class="nav-btn" data-page="contact.html"><span class="n">08</span><span>Stockists</span></button></li>
        </ul>
      </div>

      <div>
        <p class="nav-group-label">Device width</p>
        <ul class="nav-list">
          <li><button class="nav-btn is-active" data-width="390"><span class="n">—</span><span>iPhone 14 · 390</span></button></li>
          <li><button class="nav-btn" data-width="375"><span class="n">—</span><span>iPhone SE · 375</span></button></li>
          <li><button class="nav-btn" data-width="360"><span class="n">—</span><span>Android · 360</span></button></li>
          <li><button class="nav-btn" data-width="320"><span class="n">—</span><span>Small · 320</span></button></li>
        </ul>
      </div>

      <p class="note">
        <b>What you're seeing.</b> Each page is the real source HTML + CSS with a <i>mobile-overrides.css</i> loaded after components.css. Resize by picking a width — all rules live under <code>@media (max-width: 768px)</code>.
      </p>
    </aside>

    <main class="stage">
      <div class="toolbar">
        <span>Viewing</span>
        <span class="current-page" id="current-page">Cover / TOC</span>
        <span class="sep"></span>
        <span id="current-width">390 × 810</span>
        <span class="sep"></span>
        <button id="reload">Reload</button>
        <button id="open">Open in tab ↗</button>
      </div>

      <div class="phone" id="phone">
        <div class="phone-screen">
          <div class="notch"></div>
          <div class="status-bar">
            <span>9:41</span>
            <div class="right">
              <span class="signal"></span>
              <span class="wifi"></span>
              <span class="battery"><i></i></span>
            </div>
          </div>
          <div class="iframe-wrap">
            <iframe id="preview" src="mobile/index.html?v=1" title="Preview"></iframe>
          </div>
          <div class="home-indicator"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var iframe = document.getElementById('preview');
      var phone = document.getElementById('phone');
      var currentPage = document.getElementById('current-page');
      var currentWidth = document.getElementById('current-width');
      var pageBtns = document.querySelectorAll('.nav-btn[data-page]');
      var widthBtns = document.querySelectorAll('.nav-btn[data-width]');
      var reload = document.getElementById('reload');
      var openBtn = document.getElementById('open');

      var state = {
        page: localStorage.getItem('mp-page') || 'index.html',
        width: parseInt(localStorage.getItem('mp-width') || '390', 10)
      };

      // aspect ratio tuning — keep 16:9-ish
      function applyWidth(w) {
        var h = Math.round(w * (810 / 390));
        document.documentElement.style.setProperty('--phone-w', w + 'px');
        document.documentElement.style.setProperty('--phone-h', h + 'px');
        currentWidth.textContent = w + ' × ' + h;
      }

      function setPage(p) {
        state.page = p;
        localStorage.setItem('mp-page', p);
        iframe.src = 'mobile/' + p + '?v=' + Date.now();
        pageBtns.forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-page') === p);
          if (b.getAttribute('data-page') === p) {
            var label = b.querySelector('span:last-child');
            if (label) currentPage.textContent = label.textContent;
          }
        });
      }

      function setWidth(w) {
        state.width = w;
        localStorage.setItem('mp-width', String(w));
        applyWidth(w);
        widthBtns.forEach(function (b) {
          b.classList.toggle('is-active', parseInt(b.getAttribute('data-width'), 10) === w);
        });
      }

      pageBtns.forEach(function (b) {
        b.addEventListener('click', function () { setPage(b.getAttribute('data-page')); });
      });
      widthBtns.forEach(function (b) {
        b.addEventListener('click', function () { setWidth(parseInt(b.getAttribute('data-width'), 10)); });
      });

      reload.addEventListener('click', function () { iframe.src = 'mobile/' + state.page + '?v=' + Date.now(); });

      // Cache-bust inner stylesheets whenever the iframe finishes loading,
      // so edits to mobile-overrides.css / tokens.css / components.css always show up on reload.
      iframe.addEventListener('load', function () {
        try {
          var d = iframe.contentDocument;
          if (!d) return;
          var v = Date.now();
          d.querySelectorAll('link[rel="stylesheet"]').forEach(function (l) {
            var base = l.getAttribute('href').split('?')[0];
            l.setAttribute('href', base + '?v=' + v);
          });
          // Also cache-bust images so stale 404s from earlier sessions don't stick
          d.querySelectorAll('img[src]').forEach(function (img) {
            var cur = img.getAttribute('src');
            if (!cur || cur.indexOf('data:') === 0) return;
            var base = cur.split('?')[0];
            img.setAttribute('src', base + '?v=' + v);
          });
        } catch (e) {}
      });
      openBtn.addEventListener('click', function () {
        window.open('mobile/' + state.page, '_blank');
      });

      setWidth(state.width);
      setPage(state.page);
    })();
  </script>

</body>
</html>
